<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Shital ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
}

/* 🎥 Background Video */
#bg-video {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
    filter: blur(8px) brightness(0.6);
}

/* 💎 Card Center */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    width: 350px;
}

/* 📸 Slideshow */
img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 4px solid white;
    margin: 15px 0;
    object-fit: cover;
}

/* ⌨️ Typing */
#typing {
    min-height: 60px;
}

/* ❤️ Hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 6s linear infinite;
}
@keyframes float {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* 🎉 Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    animation: fall 3s linear infinite;
}
@keyframes fall {
    to { transform: translateY(100vh) rotate(360deg); }
}

/* 🎆 Firework */
.firework {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    animation: explode 1s ease-out infinite;
}
@keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(15); opacity: 0; }
}

/* 🎁 Button */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #ff4e50;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 🎥 VIDEO -->
<video autoplay muted loop id="bg-video">
    <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<!-- 🎵 AUDIO (LOCAL FILE BEST) -->
<audio id="bg-music" loop>
    <source src="videoplayback.mp3" type="audio/mp3">
</audio>

<!-- 💎 CARD -->
<div class="card">
    <h1>Happy Birthday Shital 🎂</h1>

    <img id="photo" src="https://via.placeholder.com/200">

    <p id="typing"></p>

    <button onclick="surprise()">Click for Surprise 🎁</button>
</div>

<script>

// 🎵 AUTO PLAY after first click anywhere
document.body.addEventListener("click", () => {
    document.getElementById("bg-music").play();
}, { once: true });

// 📸 Slideshow
let images = [
    "https://via.placeholder.com/200",
    "https://picsum.photos/200?1",
    "https://picsum.photos/200?2"
];

let index = 0;
setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("photo").src = images[index];
}, 3000);

// ⌨️ Typing
let text = "Tu majhya life madhe aahes mhanun sagla special vatat 💖";
let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}
typeEffect();

// ❤️ Hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 300);

// 🎉 Confetti
setInterval(() => {
    let c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random() * 100 + "vw";
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3000);
}, 100);

// 🎆 Firework
setInterval(() => {
    let f = document.createElement("div");
    f.className = "firework";
    f.style.left = Math.random() * 100 + "vw";
    f.style.top = Math.random() * 50 + "vh";
    f.style.background = `hsl(${Math.random()*360},100%,70%)`;
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 1000);
}, 800);

// 🎁 Button click
function surprise() {

    // 🎵 play music
    document.getElementById("bg-music").play();

    alert(`Happy Birthday Shital 💖🎂

सुरुवात कशी झाली हे आठवत नाही,
पण आज तू माझ्या आयुष्याचा सगळ्यात खास भाग झाली आहेस,
कधी हसण्यात, कधी रडण्यात,
प्रत्येक क्षणी तू माझ्या सोबत उभी राहिली आहेस...

भांडणं झाली, रागही आला,
पण कधीच नातं कमी झालं नाही,
कारण आपली मैत्री ही तशीच आहे,
जिथे शब्द कमी पडतात पण भावना सगळं सांगून जातात...

तू अशीच कायम खुश राहा,
तुझ्या चेहऱ्यावरचं हसू कधीच कमी होऊ नये,
कारण तुझं हसणं म्हणजे माझ्यासाठी
सगळ्यात मोठं happiness आहे...

Happy Birthday Shital ❤️❤️✨
नेहमी अशीच रहा — माझी bestie, माझी strength ❤️❤️`);
}

</script>

</body>
</html>
